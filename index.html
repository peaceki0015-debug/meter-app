<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>บันทึกข้อมูลมิเตอร์สาขา</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', Arial, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 2rem 1rem; }
  .app { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; padding: 1.25rem; margin-bottom: 1rem; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: .07em; color: #999; text-transform: uppercase; margin-bottom: .75rem; }
  .field { margin-bottom: .875rem; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
  .field input { width: 100%; padding: 9px 11px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a2e; outline: none; transition: border-color .15s; font-family: inherit; }
  .field input:focus { border-color: #378ADD; box-shadow: 0 0 0 3px rgba(55,138,221,.1); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .meter-header { display: flex; align-items: center; margin-bottom: .75rem; }
  .meter-count { font-size: 11px; color: #aaa; margin-left: auto; }
  .meter-row { display: grid; grid-template-columns: 64px 1fr 32px; gap: 8px; align-items: center; margin-bottom: 8px; animation: fi .18s ease; }
  @keyframes fi { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
  .mbadge { background: #E6F1FB; color: #185FA5; font-size: 13px; font-weight: 600; padding: 8px 6px; border-radius: 8px; text-align: center; line-height: 1.2; }
  .mbadge small { display: block; font-size: 10px; font-weight: 400; opacity: .7; margin-bottom: 1px; }
  .minput { padding: 9px 11px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a2e; outline: none; width: 100%; transition: border-color .15s; font-family: inherit; }
  .minput:focus { border-color: #378ADD; box-shadow: 0 0 0 3px rgba(55,138,221,.1); }
  .btn-rm { background: none; border: none; cursor: pointer; color: #bbb; padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: color .15s; font-size: 18px; line-height: 1; }
  .btn-rm:hover { color: #e24b4a; }
  .btn-add { display: flex; align-items: center; gap: 6px; background: none; border: 1px dashed #ccc; border-radius: 8px; padding: 9px 12px; font-size: 13px; color: #888; cursor: pointer; width: 100%; transition: all .15s; margin-top: 4px; font-family: inherit; }
  .btn-add:hover { border-color: #378ADD; color: #185FA5; background: #f0f7ff; }
  .btn-submit { width: 100%; padding: 11px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; font-family: inherit; }
  .btn-submit:hover { opacity: .85; }
  .btn-submit:disabled { opacity: .35; cursor: not-allowed; }
  .status { margin-top: .75rem; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
  .status.ok { display: block; background: #eaf3de; color: #3b6d11; border: 1px solid #c0dd97; }
  .status.err { display: block; background: #fcebeb; color: #a32d2d; border: 1px solid #f7c1c1; }
.dd-box { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid #ddd; border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.1); z-index:100; display:none; max-height:240px; overflow-y:auto; }
.dd-item { padding:10px 12px; font-size:14px; color:#1a1a2e; cursor:pointer; border-bottom:1px solid #f0f0f0; }
.dd-item:last-child { border-bottom:none; }
.dd-item:hover { background:#f0f7ff; }
</style>
</head>
<body>
<div class="app">
  <h1>บันทึกข้อมูลมิเตอร์สาขา</h1>
  <p class="subtitle">ลงทะเบียนสาขาและระบุคู่ค้าที่ใช้แต่ละมิเตอร์</p>

  <div class="card">
    <div class="section-label">ผู้กรอกข้อมูล</div>
    <div class="field-row">
      <div class="field">
        <label>รหัสพนักงาน</label>
        <input type="text" id="empId" placeholder="เช่น 1234567" />
      </div>
      <div class="field">
        <label>ชื่อพนักงาน</label>
        <input type="text" id="empName" placeholder="เช่น สมชาย ใจดี" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">ข้อมูลสาขา</div>
    <div class="field">
      <label>ค้นหาสาขา</label>
      <div class="search-wrap" style="position:relative">
        <input type="text" id="branchSearch" placeholder="พิมพ์รหัส หรือ ชื่อสาขา..." autocomplete="off" />
        <div id="branchDropdown" class="dd-box"></div>
      </div>
    </div>
    <div class="field">
      <label>รหัสสาขา</label>
      <input type="text" id="branchId" placeholder="เช่น 13440" />
    </div>
    <div class="field">
      <label>ชื่อสาขา</label>
      <input type="text" id="branchName" placeholder="เช่น พัฒนาการ 38 (กลางซอย)" />
    </div>
  </div>

  <div class="card">
    <div class="meter-header">
      <div class="section-label" style="margin-bottom:0">มิเตอร์ไฟฟ้า</div>
      <span class="meter-count" id="mcnt">0 มิเตอร์</span>
    </div>
    <div id="meterList"></div>
    <button class="btn-add" onclick="addMeter()">+ เพิ่มมิเตอร์</button>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitData()">บันทึกลง Google Sheets</button>
  <div class="status" id="statusMsg"></div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKbSCA-ljs1GGHTAVXjBS63QkhjkdL1iV-DUeBgasmnmodfJXBd95CfhVg6Llyf3-_rA/exec";
var meters = [];
var seq = 0;

function addMeter() {
  seq++;
  meters.push({ id: seq, shop: "" });
  renderMeters();
  setTimeout(function() {
    var el = document.getElementById("m" + seq);
    if (el) el.focus();
  }, 40);
}

function removeMeter(id) {
  meters = meters.filter(function(m) { return m.id !== id; });
  renderMeters();
}

function updateMeter(id, val) {
  var m = meters.find(function(x) { return x.id === id; });
  if (m) m.shop = val;
}

function renderMeters() {
  var list = document.getElementById("meterList");
  document.getElementById("mcnt").textContent = meters.length + " มิเตอร์";
  list.innerHTML = meters.map(function(m, i) {
    return '<div class="meter-row">' +
      '<div class="mbadge"><small>มิเตอร์</small>E' + (i + 1) + '</div>' +
      '<input class="minput" id="m' + m.id + '" type="text" placeholder="ชื่อร้านค้า / คู่ค้า" value="' + m.shop + '" oninput="updateMeter(' + m.id + ', this.value)" />' +
      (meters.length > 1
        ? '<button class="btn-rm" onclick="removeMeter(' + m.id + ')" title="ลบ">&#x2715;</button>'
        : '<div></div>') +
      '</div>';
  }).join("");
}

function showStatus(msg, type) {
  var el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.className = "status " + type;
}

function submitData() {
  var empId = document.getElementById("empId").value.trim();
  var empName = document.getElementById("empName").value.trim();
  var branchId = document.getElementById("branchId").value.trim();
  var branchName = document.getElementById("branchName").value.trim();

  if (!empId) { showStatus("กรุณากรอกรหัสพนักงาน", "err"); return; }
  if (!empName) { showStatus("กรุณากรอกชื่อพนักงาน", "err"); return; }
  if (!branchId) { showStatus("กรุณากรอกรหัสสาขา", "err"); return; }
  if (!branchName) { showStatus("กรุณากรอกชื่อสาขา", "err"); return; }
  if (meters.length === 0) { showStatus("กรุณาเพิ่มมิเตอร์อย่างน้อย 1 รายการ", "err"); return; }
  var empty = meters.filter(function(m) { return !m.shop.trim(); });
  if (empty.length > 0) { showStatus("กรุณากรอกชื่อร้านค้าให้ครบทุกมิเตอร์", "err"); return; }

  var btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "กำลังบันทึก...";

  var payload = {
    branchId: branchId,
    branchName: branchName,
    empId: empId,
    empName: empName,
    meters: meters.map(function(m, i) {
      return { meterCode: "E" + (i + 1), shopName: m.shop.trim() };
    })
  };

  var cbName = "cb_" + Date.now();
  var encoded = encodeURIComponent(JSON.stringify(payload));
  var url = SCRIPT_URL + "?callback=" + cbName + "&data=" + encoded;

  window[cbName] = function(result) {
    delete window[cbName];
    var s = document.getElementById("s_" + cbName);
    if (s) s.remove();
    btn.disabled = false;
    btn.textContent = "บันทึกลง Google Sheets";
    if (result && result.status === "success") {
      showStatus("บันทึกสำเร็จ! เพิ่ม " + payload.meters.length + " มิเตอร์ลง Google Sheets แล้ว", "ok");
      document.getElementById("branchId").value = "";
      document.getElementById("branchName").value = "";
      meters = []; seq = 0; renderMeters();
    } else {
      showStatus("เกิดข้อผิดพลาด: " + (result ? result.message : "ไม่ทราบสาเหตุ"), "err");
    }
  };

  setTimeout(function() {
    if (window[cbName]) {
      delete window[cbName];
      btn.disabled = false;
      btn.textContent = "บันทึกลง Google Sheets";
      showStatus("หมดเวลาเชื่อมต่อ กรุณาลองใหม่", "err");
    }
  }, 8000);

  var script = document.createElement("script");
  script.id = "s_" + cbName;
  script.src = url;
  document.head.appendChild(script);
}

addMeter();

// ── Search UI ────────────────────────────────────
var searchBox = document.getElementById('branchSearch');
var dropdown = document.getElementById('branchDropdown');

searchBox.addEventListener('input', function() {
  var q = this.value.trim();
  dropdown.innerHTML = '';
  dropdown.style.display = 'none';
  if (q.length < 1) return;
  var qPad = q.padStart(5, '0');
  var results = STORE_LIST.filter(function(s) {
    return s.code.includes(qPad) || s.code.includes(q) || s.name.includes(q);
  }).slice(0, 8);
  if (results.length === 0) return;
  results.forEach(function(s) {
    var div = document.createElement('div');
    div.className = 'dd-item';
    div.textContent = s.code + '  ' + s.name;
    div.onclick = function() {
      document.getElementById('branchId').value = s.code;
      document.getElementById('branchName').value = s.name;
      searchBox.value = s.code + '  ' + s.name;
      dropdown.style.display = 'none';
    };
    dropdown.appendChild(div);
  });
  dropdown.style.display = 'block';
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) {
    dropdown.style.display = 'none';
  }
});
</script>
