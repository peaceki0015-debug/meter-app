<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>บันทึกเลขมิเตอร์รายวัน</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', Arial, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 2rem 1rem; }
  .app { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; padding: 1.25rem; margin-bottom: 1rem; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: .07em; color: #999; text-transform: uppercase; margin-bottom: .75rem; }
  .field { margin-bottom: .875rem; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
  .field input, .field select { width: 100%; padding: 9px 11px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a2e; outline: none; transition: border-color .15s; font-family: inherit; }
  .field input:focus { border-color: #378ADD; box-shadow: 0 0 0 3px rgba(55,138,221,.1); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .branch-lookup { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: flex-end; }
  .btn-lookup { padding: 9px 16px; background: #185FA5; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s; white-space: nowrap; }
  .btn-lookup:hover { opacity: .85; }
  .btn-lookup:disabled { opacity: .35; cursor: not-allowed; }
  .branch-result { background: #e6f1fb; border: 1px solid #b3d4f5; border-radius: 8px; padding: 10px 12px; margin-top: 8px; display: none; }
  .branch-result .branch-id { font-size: 11px; color: #185FA5; font-weight: 600; margin-bottom: 2px; }
  .branch-result .branch-name { font-size: 16px; color: #1a1a2e; font-weight: 600; }
  .meter-section { display: none; }
  .meter-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .col-header { font-size: 11px; font-weight: 700; letter-spacing: .05em; color: #888; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #e8e8e8; }
  .reading-row { display: grid; grid-template-columns: 56px 1fr 100px; gap: 6px; align-items: center; margin-bottom: 8px; animation: fi .2s ease; }
  @keyframes fi { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
  .mbadge { background: #E6F1FB; color: #185FA5; font-size: 12px; font-weight: 600; padding: 7px 4px; border-radius: 8px; text-align: center; line-height: 1.2; }
  .mbadge small { display: block; font-size: 9px; font-weight: 400; opacity: .7; margin-bottom: 1px; }
  .wbadge { background: #E6F5FB; color: #0B6E8C; font-size: 12px; font-weight: 600; padding: 7px 4px; border-radius: 8px; text-align: center; line-height: 1.2; }
  .wbadge small { display: block; font-size: 9px; font-weight: 400; opacity: .7; margin-bottom: 1px; }
  .shop-name { font-size: 11px; color: #333; line-height: 1.3; }
  .reading-input { padding: 7px 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a2e; outline: none; width: 100%; transition: border-color .15s; font-family: inherit; text-align: right; }
  .reading-input:focus { border-color: #378ADD; box-shadow: 0 0 0 3px rgba(55,138,221,.1); }
  .btn-submit { width: 100%; padding: 11px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; font-family: inherit; }
  .btn-submit:hover { opacity: .85; }
  .btn-submit:disabled { opacity: .35; cursor: not-allowed; }
  .status { margin-top: .75rem; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
  .status.ok { display: block; background: #eaf3de; color: #3b6d11; border: 1px solid #c0dd97; }
  .status.err { display: block; background: #fcebeb; color: #a32d2d; border: 1px solid #f7c1c1; }
</style>
</head>
<body>
<div class="app">
  <h1>บันทึกเลขมิเตอร์รายวัน</h1>
  <p class="subtitle">กรอกรหัสสาขาเพื่อดึงข้อมูลมิเตอร์ แล้วบันทึกเลขหน้าปัด</p>

  <div class="card">
    <div class="section-label">ผู้กรอกข้อมูล</div>
    <div class="field-row">
      <div class="field">
        <label>รหัสพนักงาน</label>
        <input type="text" id="empId" placeholder="เช่น 1234567" />
      </div>
      <div class="field">
        <label>ชื่อพนักงาน</label>
        <input type="text" id="empName" placeholder="เช่น สมชาย ใจดี" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">ข้อมูลสาขา</div>
    <div class="field">
      <label>วันที่บันทึก</label>
      <input type="date" id="dateField" />
    </div>
    <div class="field">
      <label>รหัสสาขา</label>
      <div class="branch-lookup">
        <input type="text" id="branchId" placeholder="เช่น 13440" />
        <button class="btn-lookup" id="lookupBtn" onclick="lookupBranch()">ค้นหา →</button>
      </div>
      <div class="branch-result" id="branchResult">
        <div class="branch-id" id="branchIdDisplay"></div>
        <div class="branch-name" id="branchNameDisplay"></div>
      </div>
    </div>
  </div>

  <div class="meter-section" id="meterSection">
    <div class="card">
      <div class="section-label" style="margin-bottom:12px">เลขหน้าปัดมิเตอร์ (หน่วยสะสม)</div>
      <div class="meter-cols">
        <div>
          <div class="col-header">⚡ ไฟฟ้า (E)</div>
          <div id="elecList"></div>
        </div>
        <div>
          <div class="col-header">💧 น้ำ (W)</div>
          <div id="waterList"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-label">หมายเหตุ</div>
      <div class="field">
        <textarea id="remark" rows="3" placeholder="ระบุหมายเหตุเพิ่มเติม (ถ้ามี)" style="width:100%;padding:9px 11px;font-size:14px;border:1px solid #ddd;border-radius:8px;font-family:inherit;resize:vertical;outline:none;"></textarea>
      </div>
    </div>
    <button class="btn-submit" id="submitBtn" onclick="submitData()">บันทึกลง Google Sheets</button>
    <div class="status" id="statusMsg"></div>
  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzh9fTxEcGpG9oCXYqx7Ysu9RuHRdxTsCUrD_9BgZ9h0rDZNsM1iHjlup1aAZBsOJGTkg/exec";
var elecMeters = [];
var waterMeters = [];
var currentBranchName = "";

(function() {
  var now = new Date();
  var y = now.getFullYear();
  var m = ("0" + (now.getMonth() + 1)).slice(-2);
  var d = ("0" + now.getDate()).slice(-2);
  document.getElementById("dateField").value = y + "-" + m + "-" + d;
})();

function showStatus(msg, type) {
  var el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.className = "status " + type;
}

function lookupBranch() {
  var branchId = document.getElementById("branchId").value.trim();
  var empId = document.getElementById("empId").value.trim();
  var empName = document.getElementById("empName").value.trim();
  var date = document.getElementById("dateField").value;
  if (!empId) { alert("กรุณากรอกรหัสพนักงาน"); return; }
  if (!empName) { alert("กรุณากรอกชื่อพนักงาน"); return; }
  if (!date) { alert("กรุณาเลือกวันที่"); return; }
  if (!branchId) { alert("กรุณากรอกรหัสสาขา"); return; }

  var btn = document.getElementById("lookupBtn");
  btn.disabled = true;
  btn.textContent = "กำลังค้นหา...";
  document.getElementById("meterSection").style.display = "none";
  document.getElementById("branchResult").style.display = "none";

  var cbName = "cb_" + Date.now();
  var url = SCRIPT_URL + "?action=getMeters&branchId=" + encodeURIComponent(branchId) + "&callback=" + cbName;

  window[cbName] = function(result) {
    delete window[cbName];
    var s = document.getElementById("s_" + cbName);
    if (s) s.remove();
    btn.disabled = false;
    btn.textContent = "ค้นหา →";

    if (result && result.status === "success") {
      if (!result.meters || result.meters.length === 0) {
        alert("ไม่พบข้อมูลสาขา " + branchId + " กรุณาตรวจสอบรหัสสาขา");
        return;
      }
      // แยก E และ W
      elecMeters = result.meters.filter(function(m) { return m.meterCode.charAt(0) === "E"; });
      waterMeters = result.meters.filter(function(m) { return m.meterCode.charAt(0) === "W"; });
      currentBranchName = result.branchName || "";

      document.getElementById("branchIdDisplay").textContent = "สาขา " + branchId;
      document.getElementById("branchNameDisplay").textContent = currentBranchName;
      document.getElementById("branchResult").style.display = "block";

      renderMeterForm();
    } else {
      alert("เกิดข้อผิดพลาด: " + (result ? result.message : "ไม่ทราบสาเหตุ"));
    }
  };

  setTimeout(function() {
    if (window[cbName]) {
      delete window[cbName];
      btn.disabled = false;
      btn.textContent = "ค้นหา →";
      alert("หมดเวลาเชื่อมต่อ กรุณาลองใหม่");
    }
  }, 8000);

  var script = document.createElement("script");
  script.id = "s_" + cbName;
  script.src = url;
  document.head.appendChild(script);
}

function renderMeterForm() {
  var elecHtml = "";
  for (var i = 0; i < elecMeters.length; i++) {
    elecHtml += '<div class="reading-row">' +
      '<div class="mbadge"><small>มิเตอร์</small>' + elecMeters[i].meterCode + '</div>' +
      '<div class="shop-name">' + elecMeters[i].shopName + '</div>' +
      '<input class="reading-input" id="re' + i + '" type="number" placeholder="เลขมิเตอร์" min="0" />' +
      '</div>';
  }
  var waterHtml = "";
  for (var j = 0; j < waterMeters.length; j++) {
    waterHtml += '<div class="reading-row">' +
      '<div class="wbadge"><small>มิเตอร์</small>' + waterMeters[j].meterCode + '</div>' +
      '<div class="shop-name">' + waterMeters[j].shopName + '</div>' +
      '<input class="reading-input" id="rw' + j + '" type="number" placeholder="เลขมิเตอร์" min="0" style="border-color:#9BDBEC" />' +
      '</div>';
  }
  document.getElementById("elecList").innerHTML = elecHtml || '<div style="font-size:12px;color:#aaa;padding:8px">ไม่มีมิเตอร์ไฟฟ้า</div>';
  document.getElementById("waterList").innerHTML = waterHtml || '<div style="font-size:12px;color:#aaa;padding:8px">ไม่มีมิเตอร์น้ำ</div>';
  document.getElementById("meterSection").style.display = "block";
  document.getElementById("statusMsg").className = "status";
  setTimeout(function() {
    var el = document.getElementById("re0");
    if (el) el.focus();
  }, 100);
}

function submitData() {
  var branchId = document.getElementById("branchId").value.trim();
  var date = document.getElementById("dateField").value;
  var empId = document.getElementById("empId").value.trim();
  var empName = document.getElementById("empName").value.trim();

  var metersData = [];
  for (var i = 0; i < elecMeters.length; i++) {
    var val = document.getElementById("re" + i).value.trim();
    if (val === "") { showStatus("กรุณากรอกเลขมิเตอร์ไฟฟ้าให้ครบ", "err"); return; }
    metersData.push({ meterCode: elecMeters[i].meterCode, shopName: elecMeters[i].shopName, reading: parseFloat(val) });
  }
  for (var j = 0; j < waterMeters.length; j++) {
    var valw = document.getElementById("rw" + j).value.trim();
    if (valw === "") { showStatus("กรุณากรอกเลขมิเตอร์น้ำให้ครบ", "err"); return; }
    metersData.push({ meterCode: waterMeters[j].meterCode, shopName: waterMeters[j].shopName, reading: parseFloat(valw) });
  }

  var btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "กำลังบันทึก...";

  var remark = document.getElementById("remark").value.trim();
  var payload = {
    month: date,
    branchId: branchId,
    branchName: currentBranchName,
    empId: empId,
    empName: empName,
    remark: remark,
    meters: metersData
  };

  var cbName = "cb_" + Date.now();
  var encoded = encodeURIComponent(JSON.stringify(payload));
  var url = SCRIPT_URL + "?action=saveReading&callback=" + cbName + "&data=" + encoded;

  window[cbName] = function(result) {
    delete window[cbName];
    var s = document.getElementById("s_" + cbName);
    if (s) s.remove();
    btn.disabled = false;
    btn.textContent = "บันทึกลง Google Sheets";
    if (result && result.status === "success") {
      showStatus("บันทึกสำเร็จ! " + metersData.length + " มิเตอร์ วันที่ " + date, "ok");
      for (var i = 0; i < elecMeters.length; i++) {
        var el = document.getElementById("re" + i);
        if (el) el.value = "";
      }
      for (var j = 0; j < waterMeters.length; j++) {
        var elw = document.getElementById("rw" + j);
        if (elw) elw.value = "";
      }
    } else {
      showStatus("เกิดข้อผิดพลาด: " + (result ? result.message : "ไม่ทราบสาเหตุ"), "err");
    }
  };

  setTimeout(function() {
    if (window[cbName]) {
      delete window[cbName];
      btn.disabled = false;
      btn.textContent = "บันทึกลง Google Sheets";
      showStatus("หมดเวลาเชื่อมต่อ กรุณาลองใหม่", "err");
    }
  }, 8000);

  var script = document.createElement("script");
  script.id = "s_" + cbName;
  script.src = url;
  document.head.appendChild(script);
}
</script>
</body>
</html>
